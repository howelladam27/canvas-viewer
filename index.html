<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canvas Assignment Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #111827;
      --card: #1f2937;
      --accent: #3b82f6;
      --accent-soft: rgba(59,130,246,0.15);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --danger: #f97373;
      --danger-soft: rgba(248,113,113,0.15);
      --success-soft: rgba(52,211,153,0.12);
    }

    .light {
      --bg: #f3f4f6;
      --bg-soft: #e5e7eb;
      --card: #ffffff;
      --accent: #2563eb;
      --accent-soft: rgba(37,99,235,0.12);
      --text: #111827;
      --muted: #6b7280;
      --danger: #dc2626;
      --danger-soft: rgba(220,38,38,0.08);
      --success-soft: rgba(16,185,129,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1d283a 0, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 900px;
      background: linear-gradient(135deg, rgba(148,163,184,0.12), rgba(15,23,42,0.9));
      border-radius: 24px;
      padding: 1px;
      box-shadow:
        0 24px 60px rgba(15,23,42,0.7),
        0 0 0 1px rgba(148,163,184,0.25);
    }

    .app {
      border-radius: 23px;
      background: radial-gradient(circle at top left, rgba(59,130,246,0.12), transparent 55%),
                  radial-gradient(circle at bottom right, rgba(16,185,129,0.12), transparent 55%),
                  var(--bg-soft);
      padding: 20px 22px 22px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .title-block h1 {
      font-size: 20px;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-pill {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: rgba(15,23,42,0.6);
      border-radius: 999px;
      padding: 3px 9px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .title-pill span {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34,197,94,0.25);
    }

    .subtitle {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .toggle {
      width: 46px;
      height: 24px;
      border-radius: 999px;
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(148,163,184,0.5);
      display: flex;
      align-items: center;
      padding: 2px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle-thumb {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      transform: translateX(0);
      transition: transform 0.2s;
    }

    .toggle.on {
      background: rgba(37,99,235,0.25);
      border-color: rgba(96,165,250,0.9);
    }

    .toggle.on .toggle-thumb {
      transform: translateX(20px);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.4fr);
      gap: 16px;
    }

    @media (max-width: 720px) {
      body {
        padding: 12px;
      }
      .grid {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    .panel {
      background: rgba(15,23,42,0.7);
      border-radius: 18px;
      padding: 14px 14px 12px;
      border: 1px solid rgba(148,163,184,0.35);
      backdrop-filter: blur(18px);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .panel-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(15,23,42,0.8);
      color: var(--muted);
      border: 1px solid rgba(148,163,184,0.4);
    }

    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    input, select {
      width: 100%;
      padding: 7px 9px;
      border-radius: 9px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(15,23,42,0.85);
      color: var(--text);
      font-size: 13px;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.15s, background 0.15s;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      background: rgba(15,23,42,0.95);
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: -6px;
      margin-bottom: 8px;
    }

    .btn {
      width: 100%;
      padding: 9px 10px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 12px 30px rgba(37,99,235,0.45);
      margin-top: 4px;
    }

    .btn span {
      font-size: 15px;
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 8px 20px rgba(37,99,235,0.4);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      min-height: 16px;
    }

    .status strong {
      color: var(--accent);
    }

    .assignments-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .assignments-header h3 {
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .legend {
      display: flex;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 4px;
    }

    .dot.missing {
      background: var(--danger);
    }

    .dot.upcoming {
      background: #22c55e;
    }

    .list {
      max-height: 360px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 10px 11px;
      margin-bottom: 8px;
      border: 1px solid rgba(148,163,184,0.35);
      position: relative;
    }

    .card.missing {
      box-shadow: 0 0 0 1px rgba(248,113,113,0.4);
      background: linear-gradient(135deg, var(--danger-soft), var(--card));
    }

    .card.upcoming {
      box-shadow: 0 0 0 1px rgba(52,211,153,0.4);
      background: linear-gradient(135deg, var(--success-soft), var(--card));
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .card-course {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .card-meta {
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }

    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .badge.missing {
      background: rgba(248,113,113,0.18);
      color: var(--danger);
    }

    .badge.upcoming {
      background: rgba(52,211,153,0.18);
      color: #22c55e;
    }

    .link {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .link:hover {
      text-decoration: underline;
    }

    .empty {
      font-size: 12px;
      color: var(--muted);
      padding: 12px 4px 4px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="app">
      <div class="header">
        <div class="title-block">
          <div class="title-pill">
            <span></span> Canvas API Viewer
          </div>
          <h1>Assignments</h1>
          <p class="subtitle">Missing (last 30 days) & upcoming (next 3 weeks)</p>
        </div>
        <div class="toggle-wrap">
          <div class="toggle-label">Theme</div>
          <div id="themeToggle" class="toggle">
            <div class="toggle-thumb">🌙</div>
          </div>
        </div>
      </div>

      <div class="grid">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Connection</div>
            <div class="pill">Private · Local only</div>
          </div>

          <label for="baseUrl">Canvas URL</label>
          <input id="baseUrl" placeholder="https://yourdistrict.instructure.com">
          <p class="hint">Use the full base URL you see in your browser.</p>

          <label for="token">API Token</label>
          <input id="token" type="password" placeholder="Paste your Canvas access token">
          <p class="hint">Stored only in your browser. You can revoke it anytime in Canvas settings.</p>

          <label for="courseFilter">Course</label>
          <select id="courseFilter">
            <option value="all">All courses</option>
          </select>

          <button id="load" class="btn">
            <span>↻</span> Load assignments
          </button>

          <div id="status" class="status"></div>
        </div>

        <div class="panel">
          <div class="assignments-header">
            <h3>Assignments</h3>
            <div class="legend">
              <div><span class="dot missing"></span>Missing</div>
              <div><span class="dot upcoming"></span>Upcoming</div>
            </div>
          </div>
          <div id="results" class="list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
